# Starship prompt config.
#
# Intentionally minimal: rely on starship's built-in default prompt
# (directory + git branch/status + character). Add modules/palette below to
# customize. The dotfiles theming (fzf/bat/fsh/LS_COLORS) is catppuccin-mocha
# if you ever want to match it here.
#
# Stowed via the `starship/` package → ~/.config/starship.toml; the binary is
# installed by install/zsh/install.sh.

"$schema" = 'https://starship.rs/config-schema.json'

# git_status shells out to `git status`; cap it so a large repo can't hang the
# prompt (same big-repo concern noted in tmux.conf).
command_timeout = 1000
